<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>(function(){ const t=localStorage.getItem('theme')||'dark'; document.documentElement.setAttribute('data-theme',t); })();</script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.login-page {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg); padding: 20px;
}
.login-back {
  position: fixed; top: 16px; left: 16px;
  display: flex; align-items: center; gap: 8px;
  color: var(--text-muted); text-decoration: none;
  font-size: 13px; font-weight: 600; padding: 8px 14px;
  border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface); transition: all 0.2s;
  z-index: 100;
}
.login-back:hover { color: var(--accent); border-color: var(--accent); background: rgba(99,102,241,0.08); }
.theme-top { position: fixed; top: 16px; right: 16px; z-index: 100; }

.login-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 24px; padding: 40px 36px;
  width: 100%; max-width: 400px;
  box-shadow: var(--card-shadow);
  animation: fadeInUp 0.5s ease both;
}
.login-logo {
  text-align: center; margin-bottom: 32px;
}
.login-logo .icon {
  width: 64px; height: 64px; border-radius: 18px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; margin: 0 auto 14px;
  box-shadow: 0 8px 24px var(--accent-glow);
}
.login-logo h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.login-logo p  { font-size: 13px; color: var(--text-muted); }

.form-group { margin-bottom: 18px; }
.form-group label {
  display: block; font-size: 11px; font-weight: 700;
  color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.7px; margin-bottom: 8px;
}
.form-group input {
  width: 100%; padding: 14px 16px;
  background: var(--input-bg); border: 1.5px solid var(--border);
  border-radius: 12px; color: var(--text);
  font-family: 'Sora', sans-serif; font-size: 15px;
  transition: all 0.2s; box-sizing: border-box;
}
.form-group input:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.password-wrap { position: relative; }
.password-wrap input { padding-right: 44px; }
.eye-btn {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 16px; padding: 4px;
}
.eye-btn:hover { color: var(--text); }

.login-btn {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white; border: none; border-radius: 14px;
  font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 700;
  cursor: pointer; transition: all 0.3s; margin-top: 8px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.login-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-glow); }
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.error-msg {
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
  color: #ef4444; padding: 12px 14px; border-radius: 10px;
  font-size: 13px; font-weight: 600; margin-bottom: 16px;
  display: none; align-items: center; gap: 8px;
}
.error-msg.show { display: flex; animation: fadeIn 0.3s ease; }

.login-footer { text-align: center; margin-top: 24px; color: var(--text-dim); font-size: 12px; }
.attempts-warn {
  background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3);
  color: #fbbf24; padding: 10px 12px; border-radius: 10px;
  font-size: 12px; margin-bottom: 14px; display: none;
}
.attempts-warn.show { display: block; }
</style>
</head>
<body>

<!-- BACK TO HOME BUTTON -->
<a href="home.html" class="login-back">← Back to Home</a>

<!-- THEME TOGGLE -->
<div class="theme-top">
  <button class="theme-toggle-btn" id="themeToggle" onclick="toggleTheme()">☀️ Light</button>
</div>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">🔐</div>
      <h1>Admin Login</h1>
      <p id="loginSubtitle">Event Payment Management</p>
    </div>

    <div class="error-msg" id="errorMsg">❌ <span id="errorText">Invalid credentials</span></div>
    <div class="attempts-warn" id="attemptsWarn"></div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username"
             autocomplete="username" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="Enter password"
               autocomplete="current-password" id="password"
               onkeydown="if(event.key==='Enter')login()">
        <button class="eye-btn" onclick="togglePass()" id="eyeBtn" tabindex="-1">👁️</button>
      </div>
    </div>

    <div class="progress-bar" id="progressBar" style="display:none">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <button class="login-btn" id="loginBtn" onclick="login()">
      <span id="btnText">🔓 Login to Admin</span>
    </button>

    <div class="login-footer">
      <p>Authorised personnel only</p>
      <p style="margin-top:6px"><a href="home.html" class="text-link" style="font-size:12px">← Return to Event Page</a></p>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="config.js"></script>
<script>
// Admin login must always be scoped to a specific event's Spreadsheet —
// without a selected event there's no Admins sheet to validate against.
if (!requireEvent()) { /* redirected — no event selected */ }

// Load event name (from the cached event Settings — no Master DB call)
getEventSettingsCached().then(d=>{
  const n=d.EventName||"EventPay";
  document.getElementById("loginSubtitle").textContent=n;
  document.title="Admin Login — "+n;
}).catch(()=>{});

// Redirect if already logged in
if(sessionStorage.getItem("adminToken")) location.href="admin.html";

let attempts=0, lockUntil=null;

function togglePass(){
  const p=document.getElementById("password");
  const b=document.getElementById("eyeBtn");
  if(p.type==="password"){p.type="text";b.textContent="🙈";}
  else{p.type="password";b.textContent="👁️";}
}

function showError(msg){
  const e=document.getElementById("errorMsg");
  document.getElementById("errorText").textContent=msg;
  e.classList.add("show");
  setTimeout(()=>e.classList.remove("show"),4000);
}

function login(){
  if(lockUntil&&Date.now()<lockUntil){
    const secs=Math.ceil((lockUntil-Date.now())/1000);
    showError("Too many failed attempts. Try again in "+secs+"s.");
    return;
  }

  const u=document.getElementById("username").value.trim();
  const p=document.getElementById("password").value.trim();
  if(!u||!p){showError("Please enter both username and password.");return;}

  const btn=document.getElementById("loginBtn");
  const pb=document.getElementById("progressBar");
  const pf=document.getElementById("progressFill");
  btn.disabled=true;
  document.getElementById("btnText").textContent="Verifying...";
  pb.style.display="block"; pf.style.width="0%";
  setTimeout(()=>pf.style.width="60%",100);

  const params=new URLSearchParams({action:"loginAdmin",username:u,password:p,
    ip:navigator.userAgent.slice(0,50)});
  fetch(APP_CONFIG.SCRIPT_URL+"?"+params).then(r=>r.json()).then(data=>{
    pf.style.width="100%";
    setTimeout(()=>{ pb.style.display="none"; btn.disabled=false; document.getElementById("btnText").textContent="🔓 Login to Admin"; },300);

    if(data.success){
      sessionStorage.setItem("adminToken",   data.token);
      sessionStorage.setItem("adminExpiry",  data.expiry);
      sessionStorage.setItem("adminUser",    u);
      sessionStorage.setItem("adminRole",    data.role||"admin");
      sessionStorage.setItem("adminAccess",  data.accessLevel||"full");
      attempts=0;
      location.href="admin.html";
    } else {
      attempts++;
      if(attempts>=5){
        lockUntil=Date.now()+60000;
        document.getElementById("attemptsWarn").textContent="⚠️ 5 failed attempts. Locked for 60 seconds.";
        document.getElementById("attemptsWarn").classList.add("show");
        setTimeout(()=>{
          lockUntil=null; attempts=0;
          document.getElementById("attemptsWarn").classList.remove("show");
        },60000);
      } else {
        document.getElementById("attemptsWarn").textContent="⚠️ "+attempts+" of 5 attempts used.";
        document.getElementById("attemptsWarn").classList.add("show");
      }
      showError("Incorrect username or password.");
      document.getElementById("password").value="";
    }
  }).catch(()=>{
    pb.style.display="none"; btn.disabled=false;
    document.getElementById("btnText").textContent="🔓 Login to Admin";
    showError("Connection error. Please check your internet.");
  });
}

function toggleTheme(){
  const c=document.documentElement.getAttribute('data-theme')||'dark', n=c==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n); localStorage.setItem('theme',n);
  document.getElementById('themeToggle').textContent=n==='dark'?'☀️ Light':'🌙 Dark';
}
window.addEventListener('DOMContentLoaded',()=>{
  const t=document.documentElement.getAttribute('data-theme')||'dark';
  document.getElementById('themeToggle').textContent=t==='dark'?'☀️ Light':'🌙 Dark';
});
</script>
<script>if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));</script>
</body>
</html>
